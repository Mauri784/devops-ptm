name: CI/CD Pipeline - Node.js to GHCR

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}



jobs:
  sonarqube:
    name: Análisis de Calidad (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ejecución de Escáner SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=devops-ptm
            

          
  k6:
    name: Prueba de Rendimiento (K6)
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - uses: actions/checkout@v4
      - name: Instalar dependencias
        run: npm install
      - name: Iniciar app en background
        run: node ./bin/www &
      - name: Verificar que la app arrancó
        run: |
          sleep 5
          curl http://localhost:3000/health || echo "App no responde"
          ps aux | grep node
      - name: Ejecutar K6
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/workspace \
            grafana/k6 run \
            --out influxdb=http://34.132.56.98:8086/k6 \
            /workspace/tests/load-test.js

  build-and-push:
    name: Empaquetado (Docker)
    runs-on: ubuntu-latest
    needs: k6
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Despliegue Automático (CD)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u mauri784 --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/mauri784/devops-ptm:master
            docker run -d \
              --name my-node-app \
              -p 80:3000 \
              --restart always \
              ghcr.io/mauri784/devops-ptm:master
